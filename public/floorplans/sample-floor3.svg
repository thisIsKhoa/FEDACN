<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style>
      text { font-family: 'Playfair Display', 'Georgia', serif; }
      .wall { fill: none; stroke: #451a03; stroke-width: 3; }
      .label { font-size: 8px; font-weight: 700; fill: #d97706; text-anchor: middle; letter-spacing: 0.08em; font-family: sans-serif; }
      .zone-label { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; fill: #451a03; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#fafaf9" rx="8"/>

  <!-- Outer Walls -->
  <rect x="20" y="20" width="760" height="460" rx="12" class="wall"/>

  <!-- Corridor/Hallway visual -->
  <rect x="250" y="30" width="100" height="440" fill="#f5f5f4" stroke="none"/>
  <text x="300" y="250" font-size="10" fill="#a8a29e" transform="rotate(-90 300 250)" text-anchor="middle" font-family="sans-serif" letter-spacing="0.2em">CORRIDOR WEST</text>

  <!-- ═══ ZONE: Executive Offices (Left) ═══ -->
  <text x="130" y="55" class="zone-label" text-anchor="middle">EXECUTIVE SUITES</text>

  <rect id="exec_suite_101" x="40" y="80" width="180" height="75" rx="6" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
  <text x="130" y="115" font-size="12" font-weight="800" fill="#1c1917" text-anchor="middle">Suite 101 · President</text>
  <text x="130" y="132" class="label">OFFICE SUITE</text>

  <rect id="exec_suite_102" x="40" y="170" width="180" height="75" rx="6" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
  <text x="130" y="205" font-size="12" font-weight="800" fill="#1c1917" text-anchor="middle">Suite 102 · Director</text>
  <text x="130" y="222" class="label">OFFICE SUITE</text>

  <rect id="exec_suite_103" x="40" y="260" width="180" height="75" rx="6" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
  <text x="130" y="295" font-size="12" font-weight="800" fill="#1c1917" text-anchor="middle">Suite 103 · Executive</text>
  <text x="130" y="312" class="label">OFFICE SUITE</text>

  <rect id="exec_suite_104" x="40" y="350" width="180" height="100" rx="6" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
  <text x="130" y="395" font-size="12" font-weight="800" fill="#1c1917" text-anchor="middle">Suite 104 · VIP Lounge</text>
  <text x="130" y="415" class="label">OFFICE SUITE</text>


  <!-- ═══ ZONE: Boardroom & Reception (Right) ═══ -->
  <text x="570" y="55" class="zone-label" text-anchor="middle">BOARDROOM &amp; ADMIN</text>

  <!-- Large Boardroom -->
  <rect id="boardroom_main" x="380" y="80" width="370" height="180" rx="8" fill="#fff" stroke="#78350f" stroke-width="2"/>
  <rect x="440" y="145" width="250" height="50" rx="25" fill="#f5f5f4" stroke="#d97706" stroke-width="1"/>
  <text x="565" y="170" font-size="14" font-weight="800" fill="#1c1917" text-anchor="middle">Hội Nghị Grand Boardroom</text>
  <text x="565" y="185" class="label">MAIN BOARDROOM</text>

  <!-- Exec Office 105 -->
  <rect id="exec_suite_105" x="380" y="280" width="170" height="170" rx="6" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
  <text x="465" y="360" font-size="12" font-weight="800" fill="#1c1917" text-anchor="middle">Suite 105 · Finance</text>
  <text x="465" y="380" class="label">OFFICE SUITE</text>

  <!-- Reception -->
  <rect id="reception_desk" x="570" y="280" width="180" height="170" rx="6" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
  <text x="660" y="360" font-size="12" font-weight="800" fill="#1c1917" text-anchor="middle">Quầy Tiếp Tân Executive</text>
  <text x="660" y="380" class="label">RECEPTION ZONE</text>

</svg>
