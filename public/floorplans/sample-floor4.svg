<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style>
      text { font-family: 'Inter', sans-serif; }
      .wall { fill: none; stroke: #064e3b; stroke-width: 2.5; }
      .label { font-size: 8px; font-weight: 700; fill: #059669; text-anchor: middle; letter-spacing: 0.05em; }
      .zone-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.12em; fill: #064e3b; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f0fdf4" rx="8"/>

  <!-- Outer Boundary -->
  <rect x="20" y="20" width="760" height="460" rx="10" class="wall"/>

  <!-- Center Zen Garden (visual decorative element) -->
  <circle cx="400" cy="250" r="70" fill="#e6f4ea" stroke="#059669" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="400" y="245" font-size="12" font-weight="800" fill="#065f46" text-anchor="middle">Vườn Thiền</text>
  <text x="400" y="260" font-size="9" fill="#047857" text-anchor="middle">ZEN ZONE</text>
  <text x="400" y="280" font-size="14" text-anchor="middle">🪨🎋</text>

  <!-- ═══ ZONE: Quiet Pods (Left Side) ═══ -->
  <text x="170" y="55" class="zone-label" text-anchor="middle">SILENT FOCUS PODS</text>

  <!-- Focus Pods 01 - 04 -->
  <rect id="focus_pod_01" x="50" y="80" width="100" height="80" rx="8" fill="#fff" stroke="#059669" stroke-width="1"/>
  <text x="100" y="115" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Zen Cabin 1</text>
  <text x="100" y="130" class="label">FOCUS POD</text>

  <rect id="focus_pod_02" x="170" y="80" width="100" height="80" rx="8" fill="#fff" stroke="#059669" stroke-width="1"/>
  <text x="220" y="115" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Zen Cabin 2</text>
  <text x="220" y="130" class="label">FOCUS POD</text>

  <rect id="focus_pod_03" x="50" y="180" width="100" height="80" rx="8" fill="#fff" stroke="#059669" stroke-width="1"/>
  <text x="100" y="215" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Zen Cabin 3</text>
  <text x="100" y="130" class="label">FOCUS POD</text>

  <rect id="focus_pod_04" x="170" y="180" width="100" height="80" rx="8" fill="#fff" stroke="#059669" stroke-width="1"/>
  <text x="220" y="215" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Zen Cabin 4</text>
  <text x="220" y="230" class="label">FOCUS POD</text>

  <!-- Long study desks at bottom-left -->
  <rect id="quiet_desk_01" x="50" y="290" width="220" height="45" rx="6" fill="#fff" stroke="#059669" stroke-width="1"/>
  <text x="160" y="315" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Bàn Đọc Sách A</text>
  <text x="160" y="328" class="label">LONG QUIET STUDY</text>

  <rect id="quiet_desk_02" x="50" y="360" width="220" height="45" rx="6" fill="#fff" stroke="#059669" stroke-width="1"/>
  <text x="160" y="385" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Bàn Đọc Sách B</text>
  <text x="160" y="398" class="label">LONG QUIET STUDY</text>


  <!-- ═══ ZONE: Library Study Desks (Right Side) ═══ -->
  <text x="630" y="55" class="zone-label" text-anchor="middle">LIBRARY STUDY AREA</text>

  <!-- Quiet Desk pods 03 and 04 (big single desks) -->
  <rect id="quiet_desk_03" x="530" y="80" width="200" height="70" rx="6" fill="#fff" stroke="#059669" stroke-width="1"/>
  <text x="630" y="115" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Khu đọc sách riêng 1</text>
  <text x="630" y="130" class="label">QUIET ZONE DESK</text>

  <rect id="quiet_desk_04" x="530" y="160" width="200" height="70" rx="6" fill="#fff" stroke="#059669" stroke-width="1"/>
  <text x="630" y="195" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Khu đọc sách riêng 2</text>
  <text x="630" y="210" class="label">QUIET ZONE DESK</text>

  <!-- Focus Pods 05 - 08 -->
  <rect id="focus_pod_05" x="530" y="250" width="90" height="90" rx="8" fill="#fff" stroke="#059669" stroke-width="1"/>
  <text x="575" y="295" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Zen Cabin 5</text>
  <text x="575" y="310" class="label">FOCUS POD</text>

  <rect id="focus_pod_06" x="640" y="250" width="90" height="90" rx="8" fill="#fff" stroke="#059669" stroke-width="1"/>
  <text x="685" y="295" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Zen Cabin 6</text>
  <text x="685" y="310" class="label">FOCUS POD</text>

  <rect id="focus_pod_07" x="530" y="360" width="90" height="90" rx="8" fill="#fff" stroke="#059669" stroke-width="1"/>
  <text x="575" y="405" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Zen Cabin 7</text>
  <text x="575" y="420" class="label">FOCUS POD</text>

  <rect id="focus_pod_08" x="640" y="360" width="90" height="90" rx="8" fill="#fff" stroke="#059669" stroke-width="1"/>
  <text x="685" y="405" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Zen Cabin 8</text>
  <text x="685" y="420" class="label">FOCUS POD</text>

</svg>
